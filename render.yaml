services:
  - type: web
    name: heart-ai-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false   # Set this manually in Render Dashboard → Environment
      - key: HEALTH_AI_API
        sync: false   # Set this manually in Render Dashboard → Environment
